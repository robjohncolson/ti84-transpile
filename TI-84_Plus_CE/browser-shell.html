<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TI-84 Plus CE ROM Runner</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a2e; color: #e0e0e0; font-family: 'Courier New', monospace; font-size: 13px; padding: 16px; }
h1 { font-size: 16px; color: #6cb4ee; margin-bottom: 12px; }
.layout { display: flex; gap: 16px; }
.left { flex: 0 0 340px; }
.right { flex: 1; min-width: 0; }
canvas { border: 2px solid #444; background: #000; display: block; margin-bottom: 12px; image-rendering: pixelated; }
.controls { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
button { background: #2a2a4a; color: #e0e0e0; border: 1px solid #555; padding: 6px 14px; cursor: pointer; font-family: inherit; font-size: 12px; border-radius: 3px; }
button:hover { background: #3a3a6a; }
button:disabled { opacity: 0.4; cursor: not-allowed; }
button.active { background: #2a5a2a; border-color: #4a8a4a; }
.regs { background: #0d0d1a; border: 1px solid #333; padding: 10px; margin-bottom: 12px; font-size: 12px; line-height: 1.6; border-radius: 4px; }
.regs .label { color: #888; }
.regs .val { color: #6cb4ee; }
.key-state { background: #0d0d1a; border: 1px solid #333; padding: 10px; margin-bottom: 12px; font-size: 12px; line-height: 1.6; border-radius: 4px; }
.key-state .label { color: #888; }
.key-state .val { color: #6cb4ee; }
.key-state .pressed { color: #7ddf7d; }
.ti84-kbd { background: #0d0d1a; border: 1px solid #333; padding: 8px; border-radius: 4px; margin-bottom: 12px; }
.kbd-row { display: flex; gap: 2px; margin-bottom: 2px; justify-content: center; }
.kbd-key { background: #2a2a4a; color: #888; border: 1px solid #444; padding: 2px 4px; font-size: 9px; border-radius: 2px; min-width: 28px; text-align: center; cursor: default; user-select: none; }
.kbd-key.active { background: #2a5a2a; color: #7ddf7d; border-color: #4a8a4a; }
.kbd-key.fn { background: #1a1a3a; }
.kbd-key.wide { min-width: 48px; }
.log { background: #0d0d1a; border: 1px solid #333; padding: 8px; height: 500px; overflow-y: auto; font-size: 11px; line-height: 1.4; border-radius: 4px; }
.log .step { color: #555; }
.log .addr { color: #6cb4ee; }
.log .dasm { color: #ccc; }
.log .info { color: #e8a838; }
.status { background: #1e3a1e; border: 1px solid #2a5a2a; padding: 8px; margin-bottom: 12px; border-radius: 4px; color: #7ddf7d; font-size: 12px; }
.status.error { background: #3a1e1e; border-color: #5a2a2a; color: #df7d7d; }
</style>
</head>
<body>
<h1>TI-84 Plus CE ROM Executor</h1>
<div class="layout">
  <div class="left">
    <canvas id="lcd" width="320" height="240"></canvas>
    <div class="controls">
      <button id="btnBoot">Boot</button>
      <button id="btnStep" disabled>Step</button>
      <button id="btnRun100" disabled>Run 100</button>
      <button id="btnRun1K" disabled>Run 1K</button>
      <button id="btnAutoRun" disabled>AutoRun</button>
      <button id="btnReset">Reset</button>
    </div>
    <div class="controls">
      <button id="btnShowMode" disabled>MODE</button>
      <button id="btnShowPlot" disabled>Y=/Plot</button>
      <button id="btnShowStat" disabled>STAT Grid</button>
      <button id="btnShowTable" disabled>TBL SETUP</button>
      <button id="btnShowCatalog" disabled>CATALOG</button>
    </div>
    <div class="controls">
      <button id="btnShowA" disabled>Scr A (1-col)</button>
      <button id="btnShowB" disabled>Scr B (2-col)</button>
      <button id="btnShowC" disabled>Scr C (short)</button>
      <button id="btnShowD" disabled>Scr D (dialog)</button>
    </div>
    <div class="controls">
      <button id="btnShowE" disabled>Scr E (tall)</button>
      <button id="btnShowF" disabled>Scr F (full)</button>
      <button id="btnShowG" disabled>Scr G (half)</button>
    </div>
    <div id="status" class="status">Ready. Click Boot to start.</div>
    <div class="regs" id="regs">
      <span class="label">A=</span><span class="val" id="rA">00</span>
      <span class="label"> F=</span><span class="val" id="rF">00</span>
      <span class="label"> BC=</span><span class="val" id="rBC">0000</span>
      <span class="label"> DE=</span><span class="val" id="rDE">0000</span>
      <span class="label"> HL=</span><span class="val" id="rHL">0000</span><br>
      <span class="label">SP=</span><span class="val" id="rSP">000000</span>
      <span class="label"> IX=</span><span class="val" id="rIX">000000</span>
      <span class="label"> IY=</span><span class="val" id="rIY">000000</span><br>
      <span class="label">PC=</span><span class="val" id="rPC">000000</span>
      <span class="label"> IM=</span><span class="val" id="rIM">0</span>
      <span class="label"> IFF=</span><span class="val" id="rIFF">0</span>
      <span class="label"> Steps=</span><span class="val" id="rSteps">0</span>
    </div>
    <div class="key-state" id="keyState">
      <span class="label">Keys: </span><span id="activeKeys">none</span><br>
      <span class="label">Scan: </span><span class="val" id="scanCode">0x00</span>
    </div>
    <div class="ti84-kbd" id="ti84Kbd">
      <div class="kbd-row">
        <span class="kbd-key fn" data-group="6" data-bit="4">Y=</span>
        <span class="kbd-key fn" data-group="6" data-bit="3">WINDOW</span>
        <span class="kbd-key fn" data-group="6" data-bit="2">ZOOM</span>
        <span class="kbd-key fn" data-group="6" data-bit="1">TRACE</span>
        <span class="kbd-key fn" data-group="6" data-bit="0">GRAPH</span>
      </div>
      <div class="kbd-row">
        <span class="kbd-key fn" data-group="6" data-bit="5">2ND</span>
        <span class="kbd-key fn" data-group="6" data-bit="6">MODE</span>
        <span class="kbd-key fn" data-group="6" data-bit="7">DEL</span>
        <span class="kbd-key wide" data-group="1" data-bit="6">CLEAR</span>
      </div>
      <div class="kbd-row">
        <span class="kbd-key" data-group="4" data-bit="3">7</span>
        <span class="kbd-key" data-group="3" data-bit="3">8</span>
        <span class="kbd-key" data-group="2" data-bit="3">9</span>
        <span class="kbd-key" data-group="1" data-bit="3">&times;</span>
        <span class="kbd-key" data-group="1" data-bit="4">&divide;</span>
      </div>
      <div class="kbd-row">
        <span class="kbd-key" data-group="4" data-bit="2">4</span>
        <span class="kbd-key" data-group="3" data-bit="2">5</span>
        <span class="kbd-key" data-group="2" data-bit="2">6</span>
        <span class="kbd-key" data-group="1" data-bit="2">-</span>
        <span class="kbd-key" data-group="1" data-bit="5">^</span>
      </div>
      <div class="kbd-row">
        <span class="kbd-key" data-group="4" data-bit="1">1</span>
        <span class="kbd-key" data-group="3" data-bit="1">2</span>
        <span class="kbd-key" data-group="2" data-bit="1">3</span>
        <span class="kbd-key" data-group="1" data-bit="1">+</span>
      </div>
      <div class="kbd-row">
        <span class="kbd-key" data-group="4" data-bit="0">0</span>
        <span class="kbd-key" data-group="3" data-bit="0">.</span>
        <span class="kbd-key" data-group="2" data-bit="0">(-)</span>
        <span class="kbd-key wide" data-group="1" data-bit="0">ENTER</span>
      </div>
      <div class="kbd-row">
        <span class="kbd-key" data-group="0" data-bit="1">&#x25C4;</span>
        <span class="kbd-key" data-group="0" data-bit="0">&#x25BC;</span>
        <span class="kbd-key" data-group="0" data-bit="2">&#x25BA;</span>
        <span class="kbd-key" data-group="0" data-bit="3">&#x25B2;</span>
      </div>
    </div>
  </div>
  <div class="right">
    <div class="log" id="log"></div>
  </div>
</div>

<script type="module">
import { createExecutor } from './cpu-runtime.js';
import { createPeripheralBus } from './peripherals.js';
import { createKeyboardManager } from './ti84-keyboard.js';
import { createLCDRenderer } from './ti84-lcd.js';

const hex = (v, w) => v.toString(16).padStart(w, '0');
const $ = id => document.getElementById(id);

const logEl = $('log');
const statusEl = $('status');

// ROM module — loaded dynamically from .gz (repo) or .js (local dev)
let PRELIFTED_BLOCKS = null;
let TRANSPILATION_META = null;
let decodeEmbeddedRom = null;

async function loadROM() {
  try {
    setStatus('Loading compressed ROM (~15 MB)...');
    const resp = await fetch('./ROM.transpiled.js.gz');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    setStatus('Decompressing ROM...');
    const ds = new DecompressionStream('gzip');
    const jsText = await new Response(resp.body.pipeThrough(ds)).text();
    setStatus('Parsing ROM module...');
    const blob = new Blob([jsText], { type: 'text/javascript' });
    const url = URL.createObjectURL(blob);
    const mod = await import(url);
    URL.revokeObjectURL(url);
    return mod;
  } catch (_gz) {
    setStatus('Compressed ROM not found, trying local .js...');
    return await import('./ROM.transpiled.js');
  }
}

let executor = null;
let cpu = null;
let peripherals = null;
let totalSteps = 0;
let lastPc = 0;
let lastMode = 'z80';
let kbd = null;
let kbdDown = null;
let kbdUp = null;
let lcd = null;
let autoRunning = false;
const STEPS_PER_FRAME = 500;

function log(html) {
  const line = document.createElement('div');
  line.innerHTML = html;
  logEl.appendChild(line);
  if (logEl.children.length > 500) logEl.removeChild(logEl.firstChild);
  logEl.scrollTop = logEl.scrollHeight;
}

function updateRegs() {
  if (!cpu) return;
  $('rA').textContent = hex(cpu.a, 2);
  $('rF').textContent = hex(cpu.f, 2);
  $('rBC').textContent = hex(cpu.bc, 4);
  $('rDE').textContent = hex(cpu.de, 4);
  $('rHL').textContent = hex(cpu.hl, 4);
  $('rSP').textContent = hex(cpu.sp, 6);
  $('rIX').textContent = hex(cpu.ix, 6);
  $('rIY').textContent = hex(cpu.iy, 6);
  $('rPC').textContent = hex(lastPc, 6);
  $('rIM').textContent = cpu.im;
  $('rIFF').textContent = cpu.iff1;
  $('rSteps').textContent = totalSteps;
}

function setStatus(msg, error = false) {
  statusEl.textContent = msg;
  statusEl.className = error ? 'status error' : 'status';
}

function enableButtons(booted) {
  $('btnStep').disabled = !booted;
  $('btnRun100').disabled = !booted;
  $('btnRun1K').disabled = !booted;
  $('btnAutoRun').disabled = !booted;
  $('btnShowMode').disabled = !booted;
  $('btnShowPlot').disabled = !booted;
  $('btnShowStat').disabled = !booted;
  $('btnShowTable').disabled = !booted;
  $('btnShowCatalog').disabled = !booted;
  $('btnShowA').disabled = !booted;
  $('btnShowB').disabled = !booted;
  $('btnShowC').disabled = !booted;
  $('btnShowD').disabled = !booted;
  $('btnShowE').disabled = !booted;
  $('btnShowF').disabled = !booted;
  $('btnShowG').disabled = !booted;
}

// Phase 37: freshly boot → run OS init → runFrom(screen entry) and swap the
// executor/cpu/memory in place so the LCD renderer picks up the new VRAM.
// Each click is a self-contained render — no state carried from prior runs.
//
// Known screen entries (see CONTINUATION_PROMPT_CODEX.md Phases 31/34/36):
//   0x081670  STAT/MATRIX editor grid  (Phase 31)
//   0x0296dd  MODE screen              (Phase 34, 14292 cells)
//   0x078419  Y= / STAT PLOT editor    (Phase 36, 56520 cells)
function showScreen(entryAddr, entryMode, name, maxSteps = 300000) {
  if (!PRELIFTED_BLOCKS) {
    setStatus('Boot first so the ROM module is loaded.', true);
    return;
  }
  autoRunning = false;
  $('btnAutoRun').textContent = 'AutoRun';
  $('btnAutoRun').classList.remove('active');

  setStatus(`${name}: booting + OS init (this can take a second)...`);

  const romBytes = decodeEmbeddedRom();
  // Screen render paths need timer IRQ disabled — the default 200-tick timer
  // hijacks execution mid-OS-init and corrupts state (Phase 28 / Phase 33).
  const p2 = createPeripheralBus({ pllDelay: 2, timerInterrupt: false });
  const ex2 = createExecutor(PRELIFTED_BLOCKS, romBytes, { peripherals: p2 });
  const cpu2 = ex2.cpu;

  // Stage 1: cold boot (reaches 0x0019b5 halt after ~8800 steps)
  ex2.runFrom(0x000000, 'z80', { maxSteps: 20000, maxLoopIterations: 32 });

  // Stage 2: OS init handler with sentinel return frame
  cpu2.halted = false; cpu2.iff1 = 0; cpu2.iff2 = 0;
  cpu2.sp = 0xD1A87E - 3;
  romBytes[cpu2.sp] = 0xFF; romBytes[cpu2.sp + 1] = 0xFF; romBytes[cpu2.sp + 2] = 0xFF;
  ex2.runFrom(0x08C331, 'adl', { maxSteps: 100000, maxLoopIterations: 500 });

  // Clear VRAM so the render is visible on a black background
  for (let i = 0xD40000; i < 0xD40000 + 320 * 240 * 2; i++) romBytes[i] = 0x00;

  // Stage 3: prep stack + flags + IY for the screen-render call
  cpu2.halted = false; cpu2.iff1 = 0; cpu2.iff2 = 0;
  cpu2._iy = 0xD00080;
  cpu2.sp = 0xD1A87E - 12;
  for (let i = 0; i < 12; i++) romBytes[cpu2.sp + i] = 0xFF;
  cpu2.f = 0x40; // Z flag set — avoids taking RET NZ at function entry

  // Phase 40: text-glyph fg/bg color RAM vars (read by 0x0a1a3b inner writer
  // via LD DE,(0x002688)/LD DE,(0x00268a) which resolve through MBASE=0xD0).
  // Defaults are 0xFFFF/0xFFFF → glyphs invisible. Set fg=black, bg=white
  // so MODE/Y=/etc render real letter shapes.
  romBytes[0xD02688] = 0x00; romBytes[0xD02689] = 0x00; // fg = 0x0000 black
  romBytes[0xD0268A] = 0xFF; romBytes[0xD0268B] = 0xFF; // bg = 0xFFFF white

  const t0 = performance.now();
  const r = ex2.runFrom(entryAddr, entryMode, { maxSteps, maxLoopIterations: 2000 });
  const dt = Math.round(performance.now() - t0);

  // Swap globals so the existing UI hooks keep working
  executor = ex2;
  cpu = cpu2;
  peripherals = p2;
  totalSteps = r.steps;
  lastPc = r.lastPc;
  lastMode = r.lastMode;

  if (lcd) lcd.destroy();
  lcd = createLCDRenderer($('lcd'), romBytes);
  syncLCDState();
  lcd.renderFrame();

  updateRegs();
  updateKeyStateDisplay();
  updateKeyboardOverlay();
  setStatus(`${name}: ${r.steps} steps → ${r.termination} at ${hex(r.lastPc, 6)} (${dt} ms)`);
  log(`<span class="info">--- ${name} rendered (${r.steps} steps, ${dt} ms) ---</span>`);
}

function syncLCDState() {
  if (!lcd || !executor?.lcdMmio) return;
  lcd.setVRAMBase(executor.lcdMmio.upbase);
}

function updateKeyStateDisplay() {
  if (!kbd) return;
  const state = kbd.getKeyState();
  const hasKeys = state.tiKeys.length > 0;
  $('activeKeys').textContent = hasKeys
    ? state.tiKeys.map(key => key.label).join(', ')
    : 'none';
  $('activeKeys').className = hasKeys ? 'pressed' : '';

  if (!hasKeys) {
    $('scanCode').textContent = '0x00';
    return;
  }

  const key = state.tiKeys[0];
  $('scanCode').textContent = `0x${((key.group << 4) | key.bit).toString(16).padStart(2, '0')}`;
}

function updateKeyboardOverlay() {
  const keyEls = document.querySelectorAll('#ti84Kbd .kbd-key');
  if (keyEls.length === 0) return;

  if (!peripherals?.keyboard?.keyMatrix) {
    keyEls.forEach((keyEl) => keyEl.classList.remove('active'));
    return;
  }

  keyEls.forEach((keyEl) => {
    const group = Number(keyEl.dataset.group);
    const bit = Number(keyEl.dataset.bit);
    const groupState = peripherals.keyboard.keyMatrix[group];
    const isPressed = typeof groupState === 'number' && (groupState & (1 << bit)) === 0;
    keyEl.classList.toggle('active', isPressed);
  });
}

function autoRunFrame() {
  if (!autoRunning || !executor) return;
  runSteps(STEPS_PER_FRAME);
  requestAnimationFrame(autoRunFrame);
}

function runSteps(n) {
  if (!executor) return;
  const result = executor.runFrom(lastPc, lastMode, {
    maxSteps: n,
    maxLoopIterations: 64,
    onBlock: (pc, mode, meta, step) => {
      const dasm = meta?.instructions?.[0]?.dasm ?? '???';
      log(`<span class="step">[${totalSteps + step}]</span> <span class="addr">${hex(pc, 6)}:${mode}</span> <span class="dasm">${dasm}</span>`);
    },
  });
  totalSteps += result.steps;
  lastPc = result.lastPc;
  lastMode = result.lastMode;
  updateRegs();
  syncLCDState();
  if (lcd) lcd.renderFrame();
  updateKeyStateDisplay();
  setStatus(`${result.steps} steps, ${result.termination} | Total: ${totalSteps}`);
  if (result.termination === 'halt') {
    log(`<span class="info">--- HALT at ${hex(result.lastPc, 6)} ---</span>`);
  }
}

// Boot
$('btnBoot').addEventListener('click', async () => {
  $('btnBoot').disabled = true;

  if (!PRELIFTED_BLOCKS) {
    try {
      const mod = await loadROM();
      PRELIFTED_BLOCKS = mod.PRELIFTED_BLOCKS;
      TRANSPILATION_META = mod.TRANSPILATION_META;
      decodeEmbeddedRom = mod.decodeEmbeddedRom;
    } catch (e) {
      setStatus(`Failed to load ROM: ${e.message}`, true);
      $('btnBoot').disabled = false;
      return;
    }
  }

  log(`<span class="info">--- Decoding ROM (${TRANSPILATION_META.blockCount} blocks, ${TRANSPILATION_META.coveragePercent}% coverage) ---</span>`);

  const romBytes = decodeEmbeddedRom();
  peripherals = createPeripheralBus({ pllDelay: 2, timerMode: 'nmi', timerInterval: 100 });
  executor = createExecutor(PRELIFTED_BLOCKS, romBytes, { peripherals });
  cpu = executor.cpu;
  kbd = createKeyboardManager(peripherals);
  kbdDown = (e) => {
    kbd.handleKeyDown(e);
    updateKeyStateDisplay();
    updateKeyboardOverlay();
  };
  kbdUp = (e) => {
    kbd.handleKeyUp(e);
    updateKeyStateDisplay();
    updateKeyboardOverlay();
  };
  document.addEventListener('keydown', kbdDown);
  document.addEventListener('keyup', kbdUp);
  lcd = createLCDRenderer($('lcd'), romBytes);
  totalSteps = 0;
  lastPc = 0x000000;
  lastMode = 'z80';
  autoRunning = false;
  $('btnAutoRun').textContent = 'AutoRun';
  $('btnAutoRun').classList.remove('active');
  $('activeKeys').textContent = 'none';
  $('scanCode').textContent = '0x00';
  updateKeyboardOverlay();

  log(`<span class="info">--- Boot from 0x000000:z80 ---</span>`);
  enableButtons(true);
  runSteps(200);

  // Initialize OS event loop: set callback table + system flags after boot
  // This allows the ISR dispatch to reach the event loop at 0x0019BE
  romBytes[0xD02AD7] = 0xBE; romBytes[0xD02AD8] = 0x19; romBytes[0xD02AD9] = 0x00;
  romBytes[0xD0009B] |= 0x40; // (IY+27) bit 6 = dispatch-ready
  log(`<span class="info">--- Event loop initialized (callback=0x0019BE) ---</span>`);
});

$('btnStep').addEventListener('click', () => runSteps(1));
$('btnRun100').addEventListener('click', () => runSteps(100));
$('btnRun1K').addEventListener('click', () => runSteps(1000));
$('btnShowMode').addEventListener('click', () => showScreen(0x0296dd, 'adl', 'MODE'));
$('btnShowPlot').addEventListener('click', () => showScreen(0x078419, 'adl', 'Y=/STAT PLOT', 2000000));
$('btnShowStat').addEventListener('click', () => showScreen(0x081670, 'adl', 'STAT grid'));
$('btnShowTable').addEventListener('click', () => showScreen(0x09e3b4, 'adl', 'TABLE SETUP'));
$('btnShowCatalog').addEventListener('click', () => showScreen(0x04e1d0, 'adl', 'CATALOG', 500000));
// Phase 38: screens found via dispatch-table scan at 0x96e5c (switch on (0xd007e0))
$('btnShowA').addEventListener('click', () => showScreen(0x09e30c, 'adl', 'Screen A', 400000));
$('btnShowB').addEventListener('click', () => showScreen(0x09e370, 'adl', 'Screen B', 400000));
$('btnShowC').addEventListener('click', () => showScreen(0x09e2bf, 'adl', 'Screen C', 400000));
$('btnShowD').addEventListener('click', () => showScreen(0x08aac3, 'adl', 'Screen D', 100000));
// Phase 39: more candidates from (0xd007e0) dispatch-table scan
$('btnShowE').addEventListener('click', () => showScreen(0x09e312, 'adl', 'Screen E', 400000));
$('btnShowF').addEventListener('click', () => showScreen(0x0863b9, 'adl', 'Screen F', 400000));
$('btnShowG').addEventListener('click', () => showScreen(0x08aa67, 'adl', 'Screen G', 200000));
$('btnAutoRun').addEventListener('click', () => {
  autoRunning = !autoRunning;
  $('btnAutoRun').textContent = autoRunning ? 'Stop' : 'AutoRun';
  $('btnAutoRun').classList.toggle('active', autoRunning);
  if (autoRunning) requestAnimationFrame(autoRunFrame);
});

$('btnReset').addEventListener('click', () => {
  if (kbd) {
    document.removeEventListener('keydown', kbdDown);
    document.removeEventListener('keyup', kbdUp);
    kbd = null; kbdDown = null; kbdUp = null;
  }
  if (lcd) {
    lcd.destroy();
    lcd = null;
  }
  autoRunning = false;
  $('btnAutoRun').textContent = 'AutoRun';
  $('btnAutoRun').classList.remove('active');
  $('activeKeys').textContent = 'none';
  $('scanCode').textContent = '0x00';
  peripherals = null;
  updateKeyboardOverlay();
  executor = null;
  cpu = null;
  totalSteps = 0;
  lastPc = 0;
  lastMode = 'z80';
  logEl.innerHTML = '';
  enableButtons(false);
  updateRegs();
  setStatus('Ready. Click Boot to start.');
});

log(`<span class="info">Click Boot to load ROM (~15 MB compressed)</span>`);
</script>
</body>
</html>
